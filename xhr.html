<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>XMLHttpRequest</title>
    <link rel="shortcut icon" href="#" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <style>
        li {
    padding: 10px;
    border: 1px solid green;
    margin: 3px 10px;
    border-radius: 20px;
}

li:hover {
    background: lightblue;
    color: red;
}
    </style>
</head>
<body>
    <h1 class="header">XMLHttpRequest</h1>
    <div class="title"></div>
    <h4>活動列表</h4>
    <ul id="EventList">
        <li>
            <h3></h3>
        </li>
    </ul>

</body>
</html>
<script>
    /********************************************************
    * 1.api網址  https://kktix.com/events.json
    * 2.宣告一個XMLHttpRequest物件
    * 3.建立請求的各項設定及實質內容
    * 4.建立得到回應時的各項行為
    * 5.送出請求
    ********************************************************/

    //宣告一個XMLHttpRequest物件
    const xhr = new XMLHttpRequest();

    //建立請求的各項設定及實質內容
    xhr.open('GET', 'https://kktix.com/events.json');

    //建立得到回應時的各項設定及行為
    xhr.onreadystatechange= function() {
        if (xhr.readyState === 4 && xhr.status === 200) {
            const data = JSON.parse(xhr.responseText);
            console.log(data);
            let title=data.title
            let titleContainer=document.querySelector(".title");
            titleContainer.innerHTML=title;

            let events=data.entry
            let ul=document.querySelector('#EventList');
            let event='';
            for(let i=0;i<events.length/4;i++){
                event=event+`<li>
                               <h3>${events[i].title}</h3>
                             </li>`
            }
            console.log(event)
            ul.innerHTML=event
        }
    };

    //送出請求
    xhr.send();
    </script>
